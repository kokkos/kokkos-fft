name: CI (python)

on:
  pull_request:
    branches: [ "main" ]

jobs:
  # detect changes
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.detect-changes.outputs.changes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - id: detect-changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          predicate-quantifier: 'every'
          filters: |
            changes:
              - '**'
              - '!**/*.hpp'
              - '!**/*.cpp'

  test:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changes == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies and package with test extras
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade hatch "virtualenv<21"
          cd python_scripts && hatch build && pip install .

      - name: Analysing the code with pylint
        run: |
          pylint --rcfile=python_scripts/.pylintrc $(git ls-files 'examples/**/*.py' 'python_scripts/*.py')

      - name: Test with pytest
        run: pytest examples/09_derivative python_scripts

      - name: Check versions information in docs
        run: |
          python python_scripts/check_versions.py
