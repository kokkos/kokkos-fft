name: CI (spack)

on:
  pull_request:
    branches: [ "main" ]
  
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend:
          - name: nvcc
            kokkos: +cuda +wrapper cuda_arch=90
            kokkos_fft: cufft
          - name: rocm
            kokkos: +rocm amdgpu_target=gfx90a
            kokkos_fft: hipfft

    steps:
      - name: Checkout built branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: 3.12

      - name: Clone and install spack
        run: |
          git clone --depth=2 https://github.com/spack/spack.git
          spack/bin/spack install libelf

      - name: Install cmake
        run: |
          . ./spack/share/spack/setup-env.sh
          spack install cmake

      - name: Install kokkos
        run: |
          . ./spack/share/spack/setup-env.sh
          spack load cmake
          spack install kokkos ${{ matrix.backend.kokkos }}

      - name: Install kokkos-fft
        run: |
          . ./spack/share/spack/setup-env.sh
          spack load cmake kokkos
          spack install kokkos-fft ${{ matrix.backend.kokkos_fft }}

      - name: Configure and build with CMake
        run: |
          . ./spack/share/spack/setup-env.sh
          spack load cmake kokkos kokkos-fft
          cmake -B install_test/as_library/build && \
          cmake --build install_test/as_library/build -j 4"
